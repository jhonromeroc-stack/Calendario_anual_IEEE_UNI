<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario IEEE UNI - Planificador de Eventos</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        #google_signin_button {
            margin: 20px 0;
        }

        .error-message {
            color: #e74c3c;
            padding: 10px;
            margin: 10px 0;
            background: #ffe6e6;
            border-radius: 6px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: none;
        }

        .container.logged-in {
            display: block;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.5em;
        }

        .logout-btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.5);
        }

        .user-info {
            color: white;
            font-size: 0.95em;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 15px;
        }

        .month-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .month-selector button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .month-selector button:hover {
            background: #764ba2;
        }

        .month-selector span {
            font-weight: bold;
            font-size: 1.2em;
            min-width: 200px;
            text-align: center;
        }

        .calendar-container {
            padding: 30px;
        }

        .weeks {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            min-height: 150px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .day-cell:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .day-cell.other-month {
            background: #f8f9fa;
            color: #999;
        }

        .day-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #333;
        }

        .day-name {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 8px;
        }

        .day-events {
            font-size: 0.85em;
        }

        .event-item {
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 4px;
            color: white;
            font-size: 0.8em;
            font-weight: 500;
            word-break: break-word;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .event-delete {
            font-weight: bold;
            margin-left: 5px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: white;
            font-size: 1.2em;
        }

        .event-delete:hover {
            transform: scale(1.3);
        }

        /* Colores de capítulos */
        .event-RamaIEEEUNI { background-color: #1a1a1a; }
        .event-WIE { background-color: #9b59b6; }
        .event-PES { background-color: #27ae60; }
        .event-RAS { background-color: #e74c3c; }
        .event-VTS { background-color: #f39c12; }
        .event-EMBS { background-color: #6c3483; }
        .event-CS { background-color: #ff8c42; }
        .event-CSS { background-color: #0d7377; }
        .event-CAS { background-color: #52b788; }
        .event-CIS { background-color: #4ecdc4; }
        .event-SPS { background-color: #003d82; }
        .event-IAS { background-color: #2d5a2d; }
        .event-AESS { background-color: #0099cc; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: background 0.3s;
            z-index: 1001;
            position: relative;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #764ba2;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .detail-field {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .detail-field label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .detail-field p {
            color: #333;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .week {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .day-cell {
                min-height: 100px;
                padding: 8px;
                font-size: 0.85em;
            }

            .event-item {
                font-size: 0.7em;
                padding: 3px 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Container -->
    <div class="login-container" id="loginContainer">
        <h1>📅 Calendario IEEE UNI</h1>
        <p>Planificador de Eventos 2026</p>
        <p style="font-size: 0.9em; color: #999;">Ingresa con tu correo @uni.pe o @gmail.com</p>
        <div id="google_signin_button"></div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <!-- Calendar Container -->
    <div class="container" id="calendarContainer">
        <div class="header">
            <div>
                <h1>📅 Calendario IEEE UNI</h1>
                <p>Planificador de Eventos - 2026</p>
            </div>
            <div>
                <div class="user-info" id="userInfo"></div>
                <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
            </div>
        </div>

        <div class="controls">
            <div class="month-selector">
                <button onclick="previousMonth()">← Anterior</button>
                <span id="currentMonth">Junio 2026</span>
                <button onclick="nextMonth()">Siguiente →</button>
            </div>
        </div>

        <div class="calendar-container">
            <div id="calendar"></div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background-color: #1a1a1a;"></div><span>Rama IEEE UNI</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #9b59b6;"></div><span>WIE</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #27ae60;"></div><span>PES</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #e74c3c;"></div><span>RAS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #f39c12;"></div><span>VTS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #6c3483;"></div><span>EMBS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #ff8c42;"></div><span>CS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #0d7377;"></div><span>CSS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #52b788;"></div><span>CAS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #4ecdc4;"></div><span>CIS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #003d82;"></div><span>SPS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #2d5a2d;"></div><span>IAS</span></div>
            <div class="legend-item"><div class="legend-color" style="background-color: #0099cc;"></div><span>AESS</span></div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="eventDetailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="detailsTitle">Evento</div>
            <div id="detailsContent" style="margin-bottom: 15px;">
                <div class="detail-field"><label><strong>Capítulo:</strong></label><p id="detailsChapter"></p></div>
                <div class="detail-field"><label><strong>Descripción:</strong></label><p id="detailsDescription"></p></div>
                <div class="detail-field"><label><strong>Responsable:</strong></label><p id="detailsResponsible"></p></div>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-save" onclick="openNewEventModal()">Nuevo Evento</button>
                <button type="button" class="btn-cancel" onclick="closeDetailsModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Create Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Nuevo Evento</div>
            <form id="eventForm">
                <div class="form-group">
                    <label>Capítulo</label>
                    <select id="eventChapter" required>
                        <option value="">Selecciona un capítulo</option>
                        <option value="RamaIEEEUNI">Rama IEEE UNI</option>
                        <option value="WIE">WIE</option>
                        <option value="PES">PES</option>
                        <option value="RAS">RAS</option>
                        <option value="VTS">VTS</option>
                        <option value="EMBS">EMBS</option>
                        <option value="CS">CS</option>
                        <option value="CSS">CSS</option>
                        <option value="CAS">CAS</option>
                        <option value="CIS">CIS</option>
                        <option value="SPS">SPS</option>
                        <option value="IAS">IAS</option>
                        <option value="AESS">AESS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="eventName" required placeholder="Ej: Reunión Mensual">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="eventDescription" placeholder="Detalles del evento..."></textarea>
                </div>
                <div class="form-group">
                    <label>Responsable</label>
                    <input type="text" id="eventResponsible" placeholder="Nombre de quien organiza">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-save" onclick="saveEvent()">Guardar Evento</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== CONFIGURACIÓN =====
        const GOOGLE_CLIENT_ID = '342897695517-4tridm7b1glqvofricp43i9os1cm4g3d.apps.googleusercontent.com';
        const SHEET_ID = '1K182xnyW8WcBztYTj3Z9dX6x8owWa2uJxIUb--GMgdU';
        const SHEET_RANGE = 'Calendario Anual!A:E';
        const ALLOWED_DOMAINS = ['uni.pe', 'gmail.com'];
        const ALLOWED_EMAILS = [
            'jhon.romero.c@uni.pe', 'jhonoficial2003@gmail.com',
            'marcos.romero.c@uni.pe', 'alejandro.zavaleta.c@uni.pe',
            'domenick.varillas.p@uni.pe', 'eliane.antara.g@uni.pe', 'frank.gonzales.u@uni.pe',
            'david.quispe.q@uni.pe', 'jose.allccahuaman.g@uni.pe', 'alejandro.gomez.s@uni.pe',
            'victorquispe2606@gmail.com', 'angel.escudero.l@uni.pe', 'luis.sanchez.d@uni.pe',
            'azumi.santisteban.r@uni.pe', 'kenneth.pecho.r@uni.pe', 'sofia.capcha.g@uni.pe',
            'angelgutierrez16xa@gmail.com', 'york.araujo.r@uni.pe', 'nolberto.rojas.c@uni.pe',
            'oliver.beizaga.c@uni.pe', 'bryan.diaz.p@uni.pe', 'ruben.medina.o@uni.pe',
            'ariel.frias.r@uni.pe', 'ricardo.vasquez.m@uni.pe', 'renato.lazo.eng@gmail.com',
            'flower.neira.h@uni.pe'
        ];

        // ===== VARIABLES GLOBALES =====
        let currentMonth = new Date(); // Mes actual dinámicamente
        let currentDate = null;
        let currentEventIndex = null;
        let events = [];
        let userEmail = null;
        let accessToken = null;

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

        // ===== GOOGLE LOGIN =====
        function initializeGoogle() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById('google_signin_button'),
                { theme: 'outline', size: 'large', width: '100%' }
            );
        }

        function handleCredentialResponse(response) {
            const token = response.credential;
            const decoded = parseJwt(token);
            userEmail = decoded.email;

            if (!isValidEmail(userEmail)) {
                showError('Solo se permiten correos autorizados');
                return;
            }

            accessToken = response.credential;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('calendarContainer').classList.add('logged-in');
            document.getElementById('userInfo').textContent = `Bienvenido, ${userEmail}`;

            gapi.load('client', initializeSheets);
        }

        function isValidEmail(email) {
            const domain = email.split('@')[1];
            if (!ALLOWED_DOMAINS.includes(domain)) {
                return false;
            }
            return ALLOWED_EMAILS.includes(email);
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function logout() {
            google.accounts.id.disableAutoSelect();
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('calendarContainer').classList.remove('logged-in');
            userEmail = null;
            accessToken = null;
            events = [];
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        // ===== GOOGLE SHEETS API =====
        function initializeSheets() {
            gapi.client.init({
                apiKey: 'AIzaSyCJeSI2EdyIdmoqrI-DhOgkhYZBsTfmrXM',
                discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
            }).then(() => {
                loadEventsFromSheet();
            }).catch(error => {
                console.error('Error inicializando Sheets API:', error);
                showError('Error al conectar con Google Sheets');
            });
        }

        async function loadEventsFromSheet() {
            try {
                events = [];
                
                // Cargar desde Google Sheets
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: SHEET_ID,
                    range: SHEET_RANGE,
                });

                const rows = response.result.values;
                
                if (rows && rows.length > 1) {
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length >= 5 && row[0]) {
                            events.push({
                                date: row[0],
                                chapter: row[1] || '',
                                name: row[2] || '',
                                description: row[3] || '',
                                responsible: row[4] || ''
                            });
                        }
                    }
                }

                // Cargar también desde localStorage (eventos locales no subidos)
                const localEvents = localStorage.getItem('ieeeEvents');
                if (localEvents) {
                    const parsed = JSON.parse(localEvents);
                    parsed.forEach(localEvent => {
                        // Evitar duplicados
                        const exists = events.find(e => 
                            e.date === localEvent.date && 
                            e.name === localEvent.name && 
                            e.chapter === localEvent.chapter
                        );
                        if (!exists) {
                            events.push(localEvent);
                        }
                    });
                }

                // Renderizar después de cargar eventos
                setTimeout(() => {
                    renderCalendar();
                }, 100);
            } catch (error) {
                console.error('Error cargando eventos:', error);
                
                // Si falla Google Sheets, usar solo localStorage
                const localEvents = localStorage.getItem('ieeeEvents');
                if (localEvents) {
                    events = JSON.parse(localEvents);
                }
                
                renderCalendar();
            }
        }



        // ===== CALENDARIO =====
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startingDayOfWeek = firstDay.getDay();
            
            let html = '<div class="weeks">';
            let week = '<div class="week">';
            let cellCount = 0;
            
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                week += `<div class="day-cell other-month"><div class="day-header">${day}</div></div>`;
                cellCount++;
            }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                if (cellCount === 7) {
                    html += week + '</div>';
                    week = '<div class="week">';
                    cellCount = 0;
                }

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => e.date === dateStr);
                const dayOfWeek = new Date(year, month, day).getDay();
                
                week += `<div class="day-cell" onclick="openModal('${dateStr}')">
                    <div class="day-header">${day}</div>
                    <div class="day-name">${dayNames[dayOfWeek]}</div>
                    <div class="day-events">
                        ${dayEvents.map((e) => `
                            <div class="event-item event-${e.chapter}" onclick="event.stopPropagation(); viewEvent('${e.date}', '${e.name}')" title="${e.name}">
                                ${e.name}
                                <span class="event-delete" onclick="event.stopPropagation(); deleteEvent('${e.date}', '${e.name}', '${e.chapter}')">✕</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
                cellCount++;
            }

            if (cellCount > 0 && cellCount < 7) {
                const remaining = 7 - cellCount;
                for (let i = 1; i <= remaining; i++) {
                    week += `<div class="day-cell other-month"><div class="day-header">${i}</div></div>`;
                }
            }

            if (cellCount > 0) {
                html += week + '</div>';
            }

            html += '</div>';
            document.getElementById('calendar').innerHTML = html;
        }

        function openModal(dateStr) {
            currentDate = dateStr;
            document.getElementById('eventForm').reset();
            document.getElementById('eventModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
            currentDate = null;
        }

        function viewEvent(dateStr, eventName) {
            const event = events.find(e => e.date === dateStr && e.name === eventName);
            
            if (event) {
                document.getElementById('detailsTitle').textContent = `Evento: ${event.name}`;
                document.getElementById('detailsChapter').textContent = event.chapter || 'No especificado';
                document.getElementById('detailsDescription').textContent = event.description || 'Sin descripción';
                document.getElementById('detailsResponsible').textContent = event.responsible || 'No especificado';
                document.getElementById('eventDetailsModal').style.display = 'block';
            }
        }

        function closeDetailsModal() {
            document.getElementById('eventDetailsModal').style.display = 'none';
        }

        function openNewEventModal() {
            document.getElementById('eventDetailsModal').style.display = 'none';
            document.getElementById('eventForm').reset();
            document.getElementById('eventModal').style.display = 'block';
        }

        function saveEvent() {
            const chapter = document.getElementById('eventChapter').value;
            const name = document.getElementById('eventName').value;
            const description = document.getElementById('eventDescription').value;
            const responsible = document.getElementById('eventResponsible').value;

            if (!chapter || !name || !currentDate) {
                alert('Por favor completa los campos obligatorios');
                return;
            }

            const event = {
                date: currentDate,
                chapter,
                name,
                description,
                responsible
            };

            // Guardar en localStorage primero
            events.push(event);
            localStorage.setItem('ieeeEvents', JSON.stringify(events));

            // Cerrar modal
            document.getElementById('eventModal').style.display = 'none';
            document.getElementById('eventForm').reset();
            currentDate = null;

            // Guardar en Google Sheets
            if (typeof gapi !== 'undefined' && gapi.client) {
                gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: SHEET_ID,
                    range: SHEET_RANGE,
                    valueInputOption: 'USER_ENTERED',
                    values: [[event.date, event.chapter, event.name, event.description, event.responsible]],
                }).then(() => {
                    console.log('Evento guardado en Google Sheets');
                    // Recargar eventos desde el Sheet para sincronizar
                    loadEventsFromSheet();
                }).catch(error => {
                    console.error('Error guardando en Google Sheets:', error);
                    // Si falla, al menos renderizar lo que tenemos localmente
                    renderCalendar();
                });
            } else {
                renderCalendar();
            }
        }

        function deleteEvent(dateStr, eventName, eventChapter) {
            if (confirm(`¿Eliminar evento: "${eventName}"?`)) {
                const indexToDelete = events.findIndex(e => 
                    e.date === dateStr && 
                    e.name === eventName && 
                    e.chapter === eventChapter
                );
                
                if (indexToDelete !== -1) {
                    events.splice(indexToDelete, 1);
                    localStorage.setItem('ieeeEvents', JSON.stringify(events));
                    renderCalendar();
                }
            }
        }

        function previousMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1);
            renderCalendar();
        }

        window.onclick = function(event) {
            const eventModal = document.getElementById('eventModal');
            const detailsModal = document.getElementById('eventDetailsModal');
            
            if (event.target === eventModal) {
                closeModal();
            }
            if (event.target === detailsModal) {
                closeDetailsModal();
            }
        }

        // Inicializar
        window.onload = function() {
            initializeGoogle();
        }
    </script>
</body>
</html>
