<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario IEEE UNI - Planificador de Eventos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 15px;
        }

        .month-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .month-selector button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .month-selector button:hover {
            background: #764ba2;
        }

        .month-selector span {
            font-weight: bold;
            font-size: 1.2em;
            min-width: 200px;
            text-align: center;
        }

        .chapter-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .chapter-filter label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .chapter-filter input[type="checkbox"] {
            cursor: pointer;
        }

        .calendar-container {
            padding: 30px;
        }

        .weeks {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            min-height: 150px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .day-cell:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .day-cell.other-month {
            background: #f8f9fa;
            color: #999;
        }

        .day-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #333;
        }

        .day-events {
            font-size: 0.85em;
        }

        .event-item {
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 4px;
            color: white;
            font-size: 0.8em;
            font-weight: 500;
            word-break: break-word;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .event-delete {
            font-weight: bold;
            margin-left: 5px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .event-delete:hover {
            transform: scale(1.3);
        }

        /* Colores de capítulos */
        .event-RamaIEEEUNI { background-color: #1a1a1a; }
        .event-WIE { background-color: #9b59b6; }
        .event-PES { background-color: #27ae60; }
        .event-RAS { background-color: #e74c3c; }
        .event-VTS { background-color: #f39c12; }
        .event-EMBS { background-color: #6c3483; }
        .event-CS { background-color: #ff8c42; }
        .event-CSS { background-color: #0d7377; }
        .event-CAS { background-color: #52b788; }
        .event-CIS { background-color: #4ecdc4; }
        .event-SPS { background-color: #003d82; }
        .event-IAS { background-color: #2d5a2d; }
        .event-AESS { background-color: #0099cc; }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: background 0.3s;
            z-index: 1001;
            position: relative;
        }

        .btn-save {
            background: #667eea;
            color: white;
        }

        .btn-save:hover {
            background: #764ba2;
        }

        .btn-cancel {
            background: #e74c3c;
            color: white;
        }

        .btn-cancel:hover {
            background: #c0392b;
        }

        .btn-delete {
            background: #e67e22;
            color: white;
        }

        .btn-delete:hover {
            background: #d35400;
        }

        .detail-field {
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        .detail-field label {
            font-weight: bold;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .detail-field p {
            color: #333;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .day-name {
            font-size: 0.8em;
            color: #999;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .week {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .day-cell {
                min-height: 100px;
                padding: 8px;
                font-size: 0.85em;
            }

            .event-item {
                font-size: 0.7em;
                padding: 3px 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Calendario IEEE UNI</h1>
            <p>Planificador de Eventos - 2026</p>
        </div>

        <div class="controls">
            <div class="month-selector">
                <button onclick="previousMonth()">← Anterior</button>
                <span id="currentMonth">Junio 2026</span>
                <button onclick="nextMonth()">Siguiente →</button>
            </div>
            <div class="chapter-filter">
                <label><strong>Filtrar:</strong></label>
                <label><input type="checkbox" checked onchange="filterByChapter()"> Todos</label>
            </div>
        </div>

        <div class="calendar-container">
            <div id="calendar"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background-color: #1a1a1a;"></div>
                <span>Rama IEEE UNI</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #9b59b6;"></div>
                <span>WIE</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #27ae60;"></div>
                <span>PES</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #e74c3c;"></div>
                <span>RAS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #f39c12;"></div>
                <span>VTS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #6c3483;"></div>
                <span>EMBS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ff8c42;"></div>
                <span>CS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #0d7377;"></div>
                <span>CSS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #52b788;"></div>
                <span>CAS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #4ecdc4;"></div>
                <span>CIS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #003d82;"></div>
                <span>SPS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #2d5a2d;"></div>
                <span>IAS</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #0099cc;"></div>
                <span>AESS</span>
            </div>
        </div>
    </div>

    <div id="eventDetailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="detailsTitle">Evento</div>
            <div id="detailsContent" style="margin-bottom: 15px;">
                <div class="detail-field">
                    <label><strong>Capítulo:</strong></label>
                    <p id="detailsChapter"></p>
                </div>
                <div class="detail-field">
                    <label><strong>Descripción:</strong></label>
                    <p id="detailsDescription"></p>
                </div>
                <div class="detail-field">
                    <label><strong>Responsable:</strong></label>
                    <p id="detailsResponsible"></p>
                </div>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-save" onclick="openNewEventModal()">Nuevo Evento</button>
                <button type="button" class="btn-cancel" onclick="closeDetailsModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Nuevo Evento</div>
            <form id="eventForm">
                <div class="form-group">
                    <label>Capítulo</label>
                    <select id="eventChapter" required>
                        <option value="">Selecciona un capítulo</option>
                        <option value="RamaIEEEUNI">Rama IEEE UNI</option>
                        <option value="WIE">WIE</option>
                        <option value="PES">PES</option>
                        <option value="RAS">RAS</option>
                        <option value="VTS">VTS</option>
                        <option value="EMBS">EMBS</option>
                        <option value="CS">CS</option>
                        <option value="CSS">CSS</option>
                        <option value="CAS">CAS</option>
                        <option value="CIS">CIS</option>
                        <option value="SPS">SPS</option>
                        <option value="IAS">IAS</option>
                        <option value="AESS">AESS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="eventName" required placeholder="Ej: Reunión Mensual">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="eventDescription" placeholder="Detalles del evento..."></textarea>
                </div>
                <div class="form-group">
                    <label>Responsable</label>
                    <input type="text" id="eventResponsible" placeholder="Nombre de quien organiza">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-save" onclick="saveEvent()">Guardar Evento</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentMonth = new Date(2026, 5, 1); // Junio 2026
        let currentDate = null;
        let currentEventIndex = null;
        let events = JSON.parse(localStorage.getItem('ieeeEvents')) || [];

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                `${monthNames[month]} ${year}`;

            // Primer día del mes
            const firstDay = new Date(year, month, 1);
            // Último día del mes
            const lastDay = new Date(year, month + 1, 0);
            // Día de la semana del primer día (0 = Domingo)
            const startingDayOfWeek = firstDay.getDay();
            
            let html = '<div class="weeks">';
            let week = '<div class="week">';
            let cellCount = 0;
            
            // Días del mes anterior
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                week += `<div class="day-cell other-month">
                    <div class="day-header">${day}</div>
                    <div class="day-name">${dayNames[(7 - startingDayOfWeek + i) % 7]}</div>
                </div>`;
                cellCount++;
            }

            // Días del mes actual
            for (let day = 1; day <= lastDay.getDate(); day++) {
                if (cellCount === 7) {
                    html += week + '</div>';
                    week = '<div class="week">';
                    cellCount = 0;
                }

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => e.date === dateStr);
                const dayOfWeek = new Date(year, month, day).getDay();
                
                week += `<div class="day-cell" onclick="openModal('${dateStr}')">
                    <div class="day-header">${day}</div>
                    <div class="day-name">${dayNames[dayOfWeek]}</div>
                    <div class="day-events">
                        ${dayEvents.map((e, idx) => `
                            <div class="event-item event-${e.chapter}" onclick="event.stopPropagation(); viewEvent('${dateStr}', ${dayEvents.findIndex(ev => ev === e)})" title="Click para ver detalles: ${e.name}">
                                ${e.name}
                                <span class="event-delete" onclick="event.stopPropagation(); deleteEventDirectly('${dateStr}', '${e.name}', '${e.chapter}')">✕</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
                cellCount++;
            }

            // Completar última semana con días del siguiente mes
            if (cellCount > 0 && cellCount < 7) {
                const remaining = 7 - cellCount;
                for (let i = 1; i <= remaining; i++) {
                    week += `<div class="day-cell other-month">
                        <div class="day-header">${i}</div>
                        <div class="day-name">${dayNames[i % 7]}</div>
                    </div>`;
                }
            }

            if (cellCount > 0) {
                html += week + '</div>';
            }

            html += '</div>';
            document.getElementById('calendar').innerHTML = html;
        }

        function openModal(dateStr) {
            currentDate = dateStr;
            document.getElementById('eventModal').style.display = 'block';
            document.getElementById('eventForm').reset();
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
            document.getElementById('eventForm').reset();
            currentEventIndex = null;
            currentDate = null;
        }

        function saveEvent() {
            const chapter = document.getElementById('eventChapter').value;
            const name = document.getElementById('eventName').value;
            const description = document.getElementById('eventDescription').value;
            const responsible = document.getElementById('eventResponsible').value;

            if (!chapter || !name) {
                alert('Por favor completa los campos obligatorios');
                return;
            }

            if (currentEventIndex !== null) {
                // Editar evento existente
                events[currentEventIndex] = {
                    date: events[currentEventIndex].date,
                    chapter,
                    name,
                    description,
                    responsible
                };
            } else {
                // Crear nuevo evento
                const date = currentDate;
                if (!date) {
                    alert('Error: No se especificó la fecha');
                    return;
                }
                events.push({
                    date,
                    chapter,
                    name,
                    description,
                    responsible
                });
            }

            localStorage.setItem('ieeeEvents', JSON.stringify(events));
            closeModal();
            renderCalendar();
        }

        function viewEvent(dateStr, eventIdx) {
            // Obtener el evento específico
            const allEventsOnDate = events.filter(e => e.date === dateStr);
            
            if (eventIdx >= 0 && eventIdx < allEventsOnDate.length) {
                const event = allEventsOnDate[eventIdx];
                const actualIndex = events.findIndex(e => 
                    e.date === dateStr && 
                    e.name === event.name && 
                    e.chapter === event.chapter
                );
                
                // Cargar información en el modal de detalles
                document.getElementById('detailsTitle').textContent = `Evento: ${event.name}`;
                document.getElementById('detailsChapter').textContent = event.chapter || 'No especificado';
                document.getElementById('detailsDescription').textContent = event.description || 'Sin descripción';
                document.getElementById('detailsResponsible').textContent = event.responsible || 'No especificado';
                
                // Guardar información del evento actual
                currentDate = dateStr;
                currentEventIndex = actualIndex;
                
                // Abrir modal de detalles
                document.getElementById('eventDetailsModal').style.display = 'block';
            }
        }

        function openNewEventModal() {
            // Cerrar modal de detalles
            document.getElementById('eventDetailsModal').style.display = 'none';
            
            // Limpiar y preparar modal de nuevo evento
            document.getElementById('eventForm').reset();
            currentEventIndex = null;
            
            // Abrir modal de nuevo evento
            document.getElementById('eventModal').style.display = 'block';
        }

        function closeDetailsModal() {
            document.getElementById('eventDetailsModal').style.display = 'none';
            currentDate = null;
            currentEventIndex = null;
        }

        function deleteCurrentEvent() {
            if (currentEventIndex !== null) {
                const event = events[currentEventIndex];
                if (confirm(`¿Eliminar evento: "${event.name}"?`)) {
                    events.splice(currentEventIndex, 1);
                    localStorage.setItem('ieeeEvents', JSON.stringify(events));
                    closeDetailsModal();
                    renderCalendar();
                }
            }
        }

        function deleteEventDirectly(dateStr, eventName, eventChapter) {
            if (confirm(`¿Eliminar evento: "${eventName}"?`)) {
                // Encontrar el índice exacto del evento
                const indexToDelete = events.findIndex(e => 
                    e.date === dateStr && 
                    e.name === eventName && 
                    e.chapter === eventChapter
                );
                
                if (indexToDelete !== -1) {
                    events.splice(indexToDelete, 1);
                    localStorage.setItem('ieeeEvents', JSON.stringify(events));
                    renderCalendar();
                }
            }
        }

        function previousMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1);
            renderCalendar();
        }

        function filterByChapter() {
            // Implementar filtro si es necesario
        }

        window.onclick = function(event) {
            const eventModal = document.getElementById('eventModal');
            const detailsModal = document.getElementById('eventDetailsModal');
            
            if (event.target === eventModal) {
                closeModal();
            }
            if (event.target === detailsModal) {
                closeDetailsModal();
            }
        }

        // Renderizar calendar al cargar
        renderCalendar();
    </script>
</body>
</html>
