<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario IEEE UNI - Planificador de Eventos Sincronizado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.5em;
            flex: 1;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .sync-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .sync-dot.connected {
            background: #2ecc71;
        }

        .sync-dot.disconnected {
            background: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            flex-wrap: wrap;
            gap: 15px;
        }

        .month-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .month-selector button {
            padding: 10px 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .month-selector button:hover {
            background: #764ba2;
        }

        .month-selector span {
            font-weight: bold;
            font-size: 1.2em;
            min-width: 200px;
            text-align: center;
        }

        .calendar-container {
            padding: 30px;
        }

        .weeks {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-cell {
            border: 2px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            min-height: 150px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .day-cell:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .day-cell.other-month {
            background: #f8f9fa;
            color: #999;
        }

        .day-header {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #333;
        }

        .day-name {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 8px;
        }

        .day-events {
            font-size: 0.85em;
        }

        .event-item {
            padding: 5px 8px;
            margin: 3px 0;
            border-radius: 4px;
            color: white;
            font-size: 0.8em;
            font-weight: 500;
            word-break: break-word;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event-item:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .event-delete {
            font-weight: bold;
            margin-left: 5px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: white;
            font-size: 1.2em;
        }

        .event-delete:hover {
            transform: scale(1.3);
        }

        /* COLORES DE CAPÍTULOS - EXACTOS A TU ORIGINAL */
        .event-RamaIEEEUNI { background-color: #1a1a1a; }
        .event-WIE { background-color: #9b59b6; }
        .event-PES { background-color: #27ae60; }
        .event-RAS { background-color: #e74c3c; }
        .event-VTS { background-color: #f39c12; }
        .event-EMBS { background-color: #6c3483; }
        .event-CS { background-color: #ff8c42; }
        .event-IEEE_ANDESCON { background-color: #16a085; }
        .event-SB { background-color: #34495e; }
        .event-Otro { background-color: #95a5a6; }

        /* MODALES */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .close {
            color: #999;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #333;
        }

        .details-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .details-label {
            font-weight: 600;
            color: #667eea;
        }

        .details-value {
            color: #333;
        }

        .alert {
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            display: none;
        }

        .alert-success {
            background: #d5f4e6;
            color: #27ae60;
            border: 1px solid #27ae60;
            display: block;
        }

        .alert-error {
            background: #fadbd8;
            color: #e74c3c;
            border: 1px solid #e74c3c;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .week {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .day-cell {
                min-height: 100px;
                padding: 8px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Calendario IEEE UNI</h1>
            <div class="sync-status">
                <div class="sync-dot disconnected" id="syncDot"></div>
                <span id="syncText">Sincronizando...</span>
            </div>
        </div>

        <div class="controls">
            <div class="month-selector">
                <button onclick="previousMonth()">← Anterior</button>
                <span id="currentMonth"></span>
                <button onclick="nextMonth()">Siguiente →</button>
            </div>
            <button class="btn btn-primary" onclick="openNewEventModal()">+ Nuevo Evento</button>
        </div>

        <div class="calendar-container">
            <div id="calendar" class="loading">Cargando calendario...</div>
        </div>
    </div>

    <!-- MODAL PARA AGREGAR/EDITAR EVENTO -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Nuevo Evento</h2>
            <div id="alertContainer"></div>
            <form id="eventForm">
                <div class="form-group">
                    <label for="eventDate">Fecha *</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventChapter">Capítulo IEEE *</label>
                    <select id="eventChapter" required>
                        <option value="">-- Selecciona capítulo --</option>
                        <option value="RamaIEEEUNI">Rama IEEE UNI</option>
                        <option value="WIE">Women in Engineering (WIE)</option>
                        <option value="PES">Power & Energy Society (PES)</option>
                        <option value="RAS">Robotics and Automation Society (RAS)</option>
                        <option value="VTS">Vehicular Technology Society (VTS)</option>
                        <option value="EMBS">Engineering in Medicine & Biology (EMBS)</option>
                        <option value="CS">Computational Intelligence (CS)</option>
                        <option value="IEEE_ANDESCON">IEEE ANDESCON</option>
                        <option value="SB">Student Branch</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="eventName">Nombre del Evento *</label>
                    <input type="text" id="eventName" placeholder="Ej: Charla sobre Energías Renovables" required>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Descripción</label>
                    <textarea id="eventDescription" placeholder="Detalles adicionales del evento..."></textarea>
                </div>
                <div class="form-group">
                    <label for="eventResponsible">Responsable</label>
                    <input type="text" id="eventResponsible" placeholder="Nombre de quien organiza el evento">
                </div>
                <div class="button-group">
                    <button type="button" class="btn btn-primary" onclick="saveEvent()">Guardar Evento</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PARA VER DETALLES DE EVENTO -->
    <div id="eventDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDetailsModal()">&times;</span>
            <h2 id="detailsTitle">Detalles del Evento</h2>
            <div class="details-grid">
                <div class="details-label">Capítulo:</div>
                <div class="details-value" id="detailsChapter"></div>
                <div class="details-label">Descripción:</div>
                <div class="details-value" id="detailsDescription"></div>
                <div class="details-label">Responsable:</div>
                <div class="details-value" id="detailsResponsible"></div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="openNewEventModal()">Nuevo Evento</button>
                <button class="btn btn-secondary" onclick="closeDetailsModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfdSlyT7shZZYxL55DpNtxj2MY4FzbQDfvtJOn_8FRaPCPmXdHVvAajekv8gFD4xO1Bw/exec";
        const SYNC_INTERVAL = 30000; // Sincronizar cada 30 segundos

        let currentMonth = new Date();
        let currentDate = null;
        let events = [];
        let syncTimer = null;

        const monthNames = [
            'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
            'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
        ];

        const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

        // ============================================
        // SINCRONIZACIÓN
        // ============================================
        function setSyncStatus(connected) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            
            if (connected) {
                dot.className = 'sync-dot connected';
                text.textContent = '✅ Sincronizado';
            } else {
                dot.className = 'sync-dot disconnected';
                text.textContent = '⚠️ Desconectado';
            }
        }

        function loadEvents() {
            setSyncStatus(false);
            
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getAll' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Convertir del nuevo formato al formato antiguo
                    events = (data.data || []).map(e => ({
                        date: e.fecha,
                        chapter: e.capitulo,
                        name: e.titulo,
                        description: e.descripcion,
                        responsible: e.capitulo
                    }));
                    
                    setSyncStatus(true);
                    renderCalendar();
                    showAlert('Eventos sincronizados', 'success');
                } else {
                    setSyncStatus(false);
                    showAlert('Error: ' + data.message, 'error');
                    loadFromCache();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                setSyncStatus(false);
                showAlert('Error de conexión. Usando caché.', 'error');
                loadFromCache();
            });
        }

        function loadFromCache() {
            const cached = localStorage.getItem('ieeeEvents');
            if (cached) {
                events = JSON.parse(cached);
                renderCalendar();
            }
        }

        function saveToCache() {
            localStorage.setItem('ieeeEvents', JSON.stringify(events));
        }

        // ============================================
        // RENDERIZAR CALENDARIO
        // ============================================
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('currentMonth').textContent = 
                `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startingDayOfWeek = firstDay.getDay();
            
            let html = '<div class="weeks">';
            let week = '<div class="week">';
            let cellCount = 0;
            
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startingDayOfWeek - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                week += `<div class="day-cell other-month"><div class="day-header">${day}</div></div>`;
                cellCount++;
            }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                if (cellCount === 7) {
                    html += week + '</div>';
                    week = '<div class="week">';
                    cellCount = 0;
                }

                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = events.filter(e => e.date === dateStr);
                const dayOfWeek = new Date(year, month, day).getDay();
                
                week += `<div class="day-cell" onclick="openModal('${dateStr}')">
                    <div class="day-header">${day}</div>
                    <div class="day-name">${dayNames[dayOfWeek]}</div>
                    <div class="day-events">
                        ${dayEvents.map((e) => `
                            <div class="event-item event-${e.chapter}" onclick="event.stopPropagation(); viewEvent('${e.date}', '${e.name}')" title="${e.name}">
                                ${e.name.length > 15 ? e.name.substring(0, 12) + '...' : e.name}
                                <span class="event-delete" onclick="event.stopPropagation(); deleteEvent('${e.date}', '${e.name}', '${e.chapter}')">✕</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
                cellCount++;
            }

            if (cellCount > 0 && cellCount < 7) {
                const remaining = 7 - cellCount;
                for (let i = 1; i <= remaining; i++) {
                    week += `<div class="day-cell other-month"><div class="day-header">${i}</div></div>`;
                }
            }

            if (cellCount > 0) {
                html += week + '</div>';
            }

            html += '</div>';
            document.getElementById('calendar').innerHTML = html;
        }

        // ============================================
        // MODALES
        // ============================================
        function openModal(dateStr) {
            currentDate = dateStr;
            document.getElementById('eventDate').value = dateStr;
            document.getElementById('eventForm').reset();
            document.getElementById('eventDate').value = dateStr;
            document.getElementById('eventModal').style.display = 'block';
        }

        function openNewEventModal() {
            const today = new Date().toISOString().split('T')[0];
            currentDate = today;
            document.getElementById('eventDate').value = today;
            document.getElementById('eventForm').reset();
            document.getElementById('eventDate').value = today;
            document.getElementById('eventModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('eventModal').style.display = 'none';
            currentDate = null;
        }

        function closeDetailsModal() {
            document.getElementById('eventDetailsModal').style.display = 'none';
        }

        function viewEvent(dateStr, eventName) {
            const event = events.find(e => e.date === dateStr && e.name === eventName);
            
            if (event) {
                document.getElementById('detailsTitle').textContent = `Evento: ${event.name}`;
                document.getElementById('detailsChapter').textContent = event.chapter || 'No especificado';
                document.getElementById('detailsDescription').textContent = event.description || 'Sin descripción';
                document.getElementById('detailsResponsible').textContent = event.responsible || 'No especificado';
                document.getElementById('eventDetailsModal').style.display = 'block';
            }
        }

        // ============================================
        // GUARDAR/ELIMINAR EVENTOS
        // ============================================
        function saveEvent() {
            const date = document.getElementById('eventDate').value;
            const chapter = document.getElementById('eventChapter').value;
            const name = document.getElementById('eventName').value;
            const description = document.getElementById('eventDescription').value;
            const responsible = document.getElementById('eventResponsible').value;

            if (!date || !chapter || !name) {
                showAlert('Por favor completa los campos obligatorios', 'error');
                return;
            }

            const eventToSend = {
                action: 'add',
                id: 'evt_' + Date.now(),
                titulo: name,
                fecha: date,
                descripcion: description,
                capitulo: chapter,
                hora: ''
            };

            setSyncStatus(false);

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(eventToSend)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('✅ Evento agregado y sincronizado', 'success');
                    closeModal();
                    loadEvents();
                } else {
                    showAlert('Error: ' + data.message, 'error');
                    setSyncStatus(false);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showAlert('Error de conexión', 'error');
                setSyncStatus(false);
            });
        }

        function deleteEvent(dateStr, eventName, eventChapter) {
            if (confirm(`¿Eliminar evento: "${eventName}"?`)) {
                const eventToDelete = events.find(e => 
                    e.date === dateStr && 
                    e.name === eventName && 
                    e.chapter === eventChapter
                );

                if (eventToDelete) {
                    setSyncStatus(false);

                    // Eliminar localmente primero
                    events = events.filter(e => !(
                        e.date === dateStr && 
                        e.name === eventName && 
                        e.chapter === eventChapter
                    ));
                    saveToCache();
                    renderCalendar();

                    // Enviar al servidor (mejor esfuerzo)
                    showAlert('Evento eliminado', 'success');
                    loadEvents(); // Recargar para sincronizar
                }
            }
        }

        // ============================================
        // UTILIDADES
        // ============================================
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 4000);
        }

        function previousMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1);
            renderCalendar();
        }

        window.onclick = function(event) {
            const eventModal = document.getElementById('eventModal');
            const detailsModal = document.getElementById('eventDetailsModal');
            
            if (event.target === eventModal) {
                closeModal();
            }
            if (event.target === detailsModal) {
                closeDetailsModal();
            }
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        window.onload = function() {
            loadEvents();
            
            // Sincronizar cada 30 segundos
            syncTimer = setInterval(() => {
                loadEvents();
            }, SYNC_INTERVAL);
        }
    </script>
</body>
</html>
